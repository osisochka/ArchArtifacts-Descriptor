<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SIMILIS — Archaeological Artifact Classifier</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: #f0f2f5;
      color: #222;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px;
    }
    h1 { font-size: 1.6rem; color: #2c3e50; margin-bottom: 4px; }
    .subtitle { color: #7f8c8d; font-size: 0.9rem; margin-bottom: 28px; }

    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
      padding: 28px;
      width: 100%;
      max-width: 680px;
    }

    /* Drop zone */
    .drop-zone {
      border: 2px dashed #bdc3c7;
      border-radius: 8px;
      padding: 36px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      margin-bottom: 20px;
    }
    .drop-zone:hover, .drop-zone.dragover {
      border-color: #2980b9;
      background: #eaf4fd;
    }
    .drop-zone input[type=file] { display: none; }
    .drop-zone .icon { font-size: 2.5rem; margin-bottom: 8px; }
    .drop-zone p { color: #7f8c8d; font-size: 0.9rem; }

    #preview-wrap { display: none; margin-bottom: 20px; text-align: center; }
    #preview { max-height: 280px; max-width: 100%; border-radius: 6px;
               border: 1px solid #e0e0e0; }

    button#predict-btn {
      width: 100%; padding: 12px; font-size: 1rem; font-weight: 600;
      background: #2980b9; color: white; border: none; border-radius: 8px;
      cursor: pointer; transition: background .2s;
    }
    button#predict-btn:hover { background: #1a6fa0; }
    button#predict-btn:disabled { background: #aaa; cursor: default; }

    /* Results */
    #result { display: none; margin-top: 24px; }
    .result-header {
      font-size: 1rem; font-weight: 700; color: #2c3e50;
      margin-bottom: 12px; padding-bottom: 8px;
      border-bottom: 1px solid #ecf0f1;
    }
    .auto-desc {
      background: #f8f9fa; border-left: 4px solid #2980b9;
      padding: 10px 14px; border-radius: 0 6px 6px 0;
      font-style: italic; color: #34495e; margin-bottom: 16px;
      font-size: 0.95rem; line-height: 1.5;
    }
    .attr-row { display: flex; gap: 12px; margin-bottom: 12px; }
    .attr-box {
      flex: 1; background: #f0f2f5; border-radius: 8px; padding: 12px;
    }
    .attr-box .label { font-size: 0.72rem; text-transform: uppercase;
                        letter-spacing: .05em; color: #7f8c8d; margin-bottom: 4px; }
    .attr-box .value { font-size: 1.05rem; font-weight: 600; color: #2c3e50; }
    .conf-bar-wrap { margin-top: 6px; }
    .conf-bar-bg { background: #dfe6e9; border-radius: 4px; height: 6px; }
    .conf-bar-fill { background: #27ae60; border-radius: 4px; height: 6px;
                     transition: width .6s ease; }
    .conf-label { font-size: 0.75rem; color: #7f8c8d; margin-top: 2px; }

    .top3-section { margin-top: 14px; }
    .top3-section .sec-label { font-size: 0.8rem; font-weight: 600;
                                color: #7f8c8d; text-transform: uppercase;
                                letter-spacing: .05em; margin-bottom: 8px; }
    .top3-item { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .top3-item .t3-name { width: 120px; font-size: 0.88rem; color: #34495e; }
    .top3-item .t3-bar-bg { flex: 1; background: #ecf0f1; border-radius: 4px; height: 8px; }
    .top3-item .t3-bar-fill { background: #2980b9; border-radius: 4px; height: 8px;
                               transition: width .5s ease; }
    .top3-item .t3-prob { width: 44px; text-align: right; font-size: 0.82rem; color: #7f8c8d; }

    .warning { background: #fef9e7; border-left: 4px solid #f39c12;
                padding: 10px 14px; border-radius: 0 6px 6px 0;
                font-size: 0.88rem; color: #856404; margin-bottom: 12px; }
    .error { background: #fdecea; color: #c0392b; padding: 12px;
             border-radius: 6px; font-size: 0.9rem; }
    #spinner { display: none; text-align: center; padding: 16px;
               color: #7f8c8d; font-size: 0.9rem; }
  </style>
</head>
<body>
  <h1>SIMILIS</h1>
  <p class="subtitle">Автоматическое описание археологических артефактов</p>

  <div class="card">
    <div class="drop-zone" id="drop-zone">
      <input type="file" id="file-input" accept="image/*" />
      <div class="icon">🏺</div>
      <p>Перетащите фотографию артефакта сюда<br>или <strong>нажмите для выбора файла</strong></p>
    </div>

    <div id="preview-wrap">
      <img id="preview" alt="Preview" />
    </div>

    <button id="predict-btn" disabled>Классифицировать</button>

    <div id="spinner">Анализируем изображение...</div>

    <div id="result">
      <div class="result-header">Результат анализа</div>
      <div id="warning" class="warning" style="display:none"></div>
      <div class="auto-desc" id="auto-desc"></div>
      <div class="attr-row">
        <div class="attr-box">
          <div class="label">Тип предмета</div>
          <div class="value" id="pred-name">—</div>
          <div class="conf-bar-wrap">
            <div class="conf-bar-bg"><div class="conf-bar-fill" id="bar-name" style="width:0%"></div></div>
            <div class="conf-label" id="conf-name-txt">Уверенность: —</div>
          </div>
        </div>
        <div class="attr-box">
          <div class="label">Материал</div>
          <div class="value" id="pred-mat">—</div>
          <div class="conf-bar-wrap">
            <div class="conf-bar-bg"><div class="conf-bar-fill" id="bar-mat" style="width:0%"></div></div>
            <div class="conf-label" id="conf-mat-txt">Уверенность: —</div>
          </div>
        </div>
      </div>

      <div class="top3-section">
        <div class="sec-label">Топ-3 типа</div>
        <div id="top3-names"></div>
      </div>
      <div class="top3-section" style="margin-top:10px">
        <div class="sec-label">Топ-3 материала</div>
        <div id="top3-mats"></div>
      </div>
    </div>
  </div>

  <script>
    const dropZone   = document.getElementById('drop-zone');
    const fileInput  = document.getElementById('file-input');
    const preview    = document.getElementById('preview');
    const previewWrap = document.getElementById('preview-wrap');
    const predictBtn = document.getElementById('predict-btn');
    const resultDiv  = document.getElementById('result');
    const spinner    = document.getElementById('spinner');
    let currentFile  = null;

    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      const f = e.dataTransfer.files[0];
      if (f && f.type.startsWith('image/')) setFile(f);
    });

    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) setFile(fileInput.files[0]);
    });

    function setFile(f) {
      currentFile = f;
      const url = URL.createObjectURL(f);
      preview.src = url;
      previewWrap.style.display = 'block';
      predictBtn.disabled = false;
      resultDiv.style.display = 'none';
    }

    predictBtn.addEventListener('click', async () => {
      if (!currentFile) return;
      predictBtn.disabled = true;
      spinner.style.display = 'block';
      resultDiv.style.display = 'none';

      const formData = new FormData();
      formData.append('file', currentFile);

      try {
        const resp = await fetch('/predict', { method: 'POST', body: formData });
        if (!resp.ok) {
          const err = await resp.json();
          showError(err.detail || 'Ошибка сервера');
          return;
        }
        const data = await resp.json();
        showResult(data);
      } catch (err) {
        showError('Не удалось подключиться к серверу: ' + err.message);
      } finally {
        predictBtn.disabled = false;
        spinner.style.display = 'none';
      }
    });

    function showResult(d) {
      document.getElementById('auto-desc').textContent = d.auto_description;
      document.getElementById('pred-name').textContent = d.pred_name;
      document.getElementById('pred-mat').textContent  = d.pred_material;

      const pn = Math.round(d.conf_name * 100);
      const pm = Math.round(d.conf_material * 100);
      document.getElementById('bar-name').style.width = pn + '%';
      document.getElementById('bar-mat').style.width  = pm + '%';
      document.getElementById('conf-name-txt').textContent = `Уверенность: ${pn}%`;
      document.getElementById('conf-mat-txt').textContent  = `Уверенность: ${pm}%`;

      const warn = document.getElementById('warning');
      if (!d.model_ready) {
        warn.style.display = 'block';
        warn.textContent = 'Модель ещё не обучена — отображены заглушки. Запустите ноутбук.';
      } else {
        warn.style.display = 'none';
      }

      renderTop3('top3-names', d.top3_names);
      renderTop3('top3-mats',  d.top3_materials);

      resultDiv.style.display = 'block';
    }

    function renderTop3(id, items) {
      const el = document.getElementById(id);
      el.innerHTML = '';
      (items || []).forEach(item => {
        const pct = Math.round(item.prob * 100);
        el.insertAdjacentHTML('beforeend', `
          <div class="top3-item">
            <span class="t3-name">${item.label}</span>
            <div class="t3-bar-bg">
              <div class="t3-bar-fill" style="width:${pct}%"></div>
            </div>
            <span class="t3-prob">${pct}%</span>
          </div>`);
      });
    }

    function showError(msg) {
      resultDiv.innerHTML = `<div class="error">Ошибка: ${msg}</div>`;
      resultDiv.style.display = 'block';
    }
  </script>
</body>
</html>
